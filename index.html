<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Видеозвонок (аудио/видео с fallback)</title>
    <style>
        /* ===== Стили (упрощённые, но все элементы есть) ===== */
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background:#0b0e14; color:#eef2f8; min-height:100vh; display:flex; justify-content:center; align-items:center; padding:16px; }
        .app { max-width:1200px; width:100%; background:#141a24; border-radius:28px; padding:24px 28px 32px; box-shadow:0 20px 60px rgba(0,0,0,0.7); border:1px solid #2a3340; }
        h1 { font-size:22px; font-weight:600; display:flex; align-items:center; gap:10px; margin-bottom:22px; color:#f0f4fe; }
        h1 small { font-size:14px; font-weight:400; color:#7a8aa0; }
        .status-badge { font-size:12px; font-weight:500; background:#1f2a38; color:#8aa0c0; padding:2px 14px; border-radius:40px; margin-left:auto; }
        .status-badge.online { background:#1a3a2a; color:#5fd9a0; }
        .video-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:22px; border-radius:18px; overflow:hidden; background:#0f151e; min-height:340px; }
        .video-wrapper { position:relative; background:#0a0e15; border-radius:16px; overflow:hidden; aspect-ratio:16/9; min-height:200px; border:1px solid #26303e; }
        .video-wrapper.active { border-color:#3b6af0; }
        .video-wrapper video { width:100%; height:100%; object-fit:cover; display:block; background:#0a0e15; }
        .video-label { position:absolute; bottom:12px; left:14px; background:rgba(0,0,0,0.65); backdrop-filter:blur(6px); padding:4px 14px; border-radius:40px; font-size:12px; font-weight:500; color:#cddcec; pointer-events:none; border:1px solid rgba(255,255,255,0.06); }
        .video-label .dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px; background:#3b6af0; }
        .video-label .dot.green { background:#3dd68c; }
        .video-label .dot.off { background:#5a6a80; }
        .placeholder { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#4a5a70; font-size:14px; gap:6px; background:#0f151e; }
        .controls { display:flex; flex-wrap:wrap; gap:10px; align-items:center; margin-bottom:20px; background:#111a26; padding:12px 18px; border-radius:60px; border:1px solid #26303e; }
        .controls .btn-group { display:flex; gap:6px; flex-wrap:wrap; flex:1; }
        .btn { display:inline-flex; align-items:center; justify-content:center; gap:7px; padding:9px 18px; border-radius:40px; border:none; font-size:13px; font-weight:500; cursor:pointer; transition:all 0.2s; background:#1f2a38; color:#cddcec; white-space:nowrap; }
        .btn:hover { background:#2c3a4c; transform:translateY(-1px); }
        .btn:active { transform:scale(0.97); }
        .btn-primary { background:#2b5fe0; color:#fff; }
        .btn-primary:hover { background:#3b70f0; }
        .btn-danger { background:#c2414a; color:#fff; }
        .btn-danger:hover { background:#d9555e; }
        .btn-success { background:#1f8b4c; color:#fff; }
        .btn-success:hover { background:#28a35c; }
        .btn-outline { background:transparent; border:1px solid #3a4a5e; }
        .btn-outline:hover { background:#1f2a38; }
        .btn-icon { font-size:18px; line-height:1; }
        .btn.active { background:#3b6af0; color:#fff; box-shadow:0 0 0 2px #3b6af066; }
        .btn.active-danger { background:#c2414a; color:#fff; }
        .signaling { background:#0f151e; border-radius:16px; padding:18px 20px 20px; border:1px solid #26303e; margin-top:4px; }
        .signaling .row { display:flex; flex-wrap:wrap; gap:10px; align-items:stretch; margin-bottom:10px; }
        .signaling .row:last-child { margin-bottom:0; }
        .signaling textarea { flex:1; min-width:180px; background:#0a0e15; border:1px solid #26303e; border-radius:12px; color:#d6e4f0; font-size:13px; font-family:'Courier New',monospace; padding:12px 14px; resize:vertical; min-height:70px; transition:border 0.2s; }
        .signaling textarea:focus { outline:none; border-color:#3b6af0; }
        .signaling .hint { font-size:12px; color:#5a6a80; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
        .signaling .hint code { background:#1a2330; padding:2px 10px; border-radius:20px; font-size:11px; color:#9ab0d0; }
        .step-label { font-size:12px; font-weight:600; color:#7a8aa0; text-transform:uppercase; letter-spacing:0.4px; display:flex; align-items:center; gap:6px; min-width:100px; }
        @media (max-width:740px) { .app { padding:16px; } .video-grid { grid-template-columns:1fr; gap:12px; } .controls { border-radius:20px; padding:10px 14px; } .btn { padding:7px 12px; font-size:12px; } .signaling { padding:14px; } .signaling .row { flex-direction:column; } .step-label { min-width:auto; } h1 { font-size:18px; } }
        @media (max-width:460px) { .btn { padding:6px 10px; font-size:11px; } }
        .hidden { display:none !important; }
        .text-muted { color:#5a6a80; }
        .alert { background:#2a1a1a; border:1px solid #b94a4a; border-radius:12px; padding:10px 16px; color:#f0c0c0; font-size:13px; margin-bottom:10px; }
        .alert-success { background:#1a2a1a; border-color:#4a9a4a; color:#b0e0b0; }
    </style>
</head>
<body>
    <div class="app" id="app">
        <h1>📡 Видеозвонок <small>с демонстрацией экрана</small>
            <span class="status-badge" id="connectionStatus">⏳ Ожидание</span>
        </h1>

        <!-- Видео -->
        <div class="video-grid">
            <div class="video-wrapper" id="remoteWrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label"><span class="dot" id="remoteDot"></span><span id="remoteLabel">Собеседник</span></div>
                <div class="placeholder" id="remotePlaceholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Ожидание подключения…</span></div>
            </div>
            <div class="video-wrapper active" id="localWrapper">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label"><span class="dot green" id="localDot"></span><span id="localLabel">Вы</span></div>
                <div class="placeholder" id="localPlaceholder"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg><span>Камера не активна</span></div>
            </div>
        </div>

        <!-- Управление -->
        <div class="controls">
            <div class="btn-group">
                <button class="btn" id="btnMute"><span class="btn-icon">🎤</span> <span id="muteLabel">Выкл. микрофон</span></button>
                <button class="btn" id="btnVideo"><span class="btn-icon">📷</span> <span id="videoLabel">Выкл. камеру</span></button>
                <button class="btn" id="btnScreen"><span class="btn-icon">🖥️</span> <span id="screenLabel">Показать экран</span></button>
                <button class="btn btn-danger" id="btnEndCall"><span class="btn-icon">📞</span> Завершить</button>
            </div>
            <div style="display:flex;gap:6px;margin-left:auto;">
                <button class="btn btn-outline" id="btnReset">🔄 Сброс</button>
                <button class="btn btn-outline" id="btnRetryAccess" style="background:#2a3a5a;">📸 Запросить доступ</button>
            </div>
        </div>

        <!-- Сигналинг -->
        <div class="signaling" id="signalingPanel">
            <div class="row">
                <div class="step-label">📨 Сигналинг</div>
                <button class="btn btn-primary" id="btnCreateOffer">➕ Создать Offer</button>
                <button class="btn btn-success" id="btnCreateAnswer">➡️ Создать Answer</button>
                <button class="btn btn-outline" id="btnConnectAnswer">🔗 Применить Answer</button>
                <button class="btn btn-outline" id="btnConnectOffer">🔗 Применить Offer</button>
                <span class="hint" style="margin-left:auto;"><span id="peerIdLabel">🆔 ID: —</span></span>
            </div>
            <div class="row">
                <textarea id="sdpOutput" placeholder="Здесь появится Offer / Answer для копирования…" spellcheck="false"></textarea>
                <textarea id="sdpInput" placeholder="Вставьте сюда Offer или Answer от собеседника…" spellcheck="false"></textarea>
            </div>
            <div class="row">
                <div class="hint">
                    <span>📋 Скопируйте свой Offer/Answer и отправьте другу.</span>
                    <button class="btn btn-outline" id="btnCopyOutput" style="padding:4px 14px;font-size:12px;">📄 Копировать</button>
                    <button class="btn btn-outline" id="btnPasteInput" style="padding:4px 14px;font-size:12px;">📥 Вставить</button>
                </div>
                <div class="hint" style="margin-left:auto;"><code id="iceStatus">ICE: ⏳</code></div>
            </div>
            <div id="errorAlert" class="alert hidden" style="margin-top:8px;"></div>
            <div class="row" style="margin-top:6px;border-top:1px solid #1f2a38;padding-top:10px;">
                <div class="hint" style="flex:1;font-size:12px;color:#6a7a90;" id="logArea">💡 Готов к работе.</div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- DOM ----------
            const localVideo = document.getElementById('localVideo');
            const remoteVideo = document.getElementById('remoteVideo');
            const localPlaceholder = document.getElementById('localPlaceholder');
            const remotePlaceholder = document.getElementById('remotePlaceholder');
            const localDot = document.getElementById('localDot');
            const remoteDot = document.getElementById('remoteDot');
            const localLabel = document.getElementById('localLabel');
            const remoteLabel = document.getElementById('remoteLabel');
            const btnMute = document.getElementById('btnMute');
            const btnVideo = document.getElementById('btnVideo');
            const btnScreen = document.getElementById('btnScreen');
            const btnEndCall = document.getElementById('btnEndCall');
            const btnReset = document.getElementById('btnReset');
            const btnRetryAccess = document.getElementById('btnRetryAccess');
            const btnCreateOffer = document.getElementById('btnCreateOffer');
            const btnCreateAnswer = document.getElementById('btnCreateAnswer');
            const btnConnectOffer = document.getElementById('btnConnectOffer');
            const btnConnectAnswer = document.getElementById('btnConnectAnswer');
            const btnCopyOutput = document.getElementById('btnCopyOutput');
            const btnPasteInput = document.getElementById('btnPasteInput');
            const sdpOutput = document.getElementById('sdpOutput');
            const sdpInput = document.getElementById('sdpInput');
            const connectionStatus = document.getElementById('connectionStatus');
            const iceStatus = document.getElementById('iceStatus');
            const logArea = document.getElementById('logArea');
            const peerIdLabel = document.getElementById('peerIdLabel');
            const errorAlert = document.getElementById('errorAlert');
            const muteLabel = document.getElementById('muteLabel');
            const videoLabel = document.getElementById('videoLabel');
            const screenLabel = document.getElementById('screenLabel');

            // ---------- State ----------
            let pc = null;
            let localStream = null;        // всегда содержит аудио, видео – опционально
            let screenStream = null;
            let isScreenSharing = false;
            let isMuted = false;
            let isVideoOff = false;
            let isCallActive = false;
            let videoSender = null;
            let audioSender = null;
            let cameraTrack = null;
            let audioTrack = null;
            let screenTrack = null;
            let hasVideo = false;   // флаг, что видео доступно

            // ---------- ICE/TURN ----------
            const rtcConfig = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'turn:openrelay.metered.ca:80', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443', username: 'openrelayproject', credential: 'openrelayproject' },
                    { urls: 'turn:openrelay.metered.ca:443?transport=tcp', username: 'openrelayproject', credential: 'openrelayproject' }
                ],
                iceCandidatePoolSize: 10,
            };

            // ---------- Logging ----------
            function log(msg) {
                const time = new Date().toLocaleTimeString();
                logArea.textContent = `[${time}] ${msg}`;
                console.log(`[WebRTC] ${msg}`);
            }

            function setStatus(text, isOnline = false) {
                connectionStatus.textContent = text;
                connectionStatus.className = 'status-badge' + (isOnline ? ' online' : '');
            }

            function setIceStatus(text) {
                iceStatus.textContent = 'ICE: ' + text;
            }

            function showError(msg, isSuccess = false) {
                errorAlert.classList.remove('hidden', 'alert-success');
                errorAlert.textContent = msg;
                if (isSuccess) {
                    errorAlert.classList.add('alert-success');
                }
                setTimeout(() => { errorAlert.classList.add('hidden'); }, 8000);
            }

            // ---------- PeerConnection ----------
            function createPeerConnection() {
                if (pc) { pc.close(); pc = null; }
                pc = new RTCPeerConnection(rtcConfig);
                pc.oniceconnectionstatechange = () => {
                    const state = pc.iceConnectionState;
                    setIceStatus(state);
                    log(`ICE state: ${state}`);
                    if (state === 'connected' || state === 'completed') { setStatus('✅ Подключено', true);
                        isCallActive = true; } else if (state === 'disconnected' || state === 'failed' || state ===
                        'closed') {
                        if (state === 'failed') setStatus('❌ Ошибка ICE');
                        else if (state === 'disconnected') setStatus('⚠️ Разрыв');
                        else if (state === 'closed') setStatus('🔴 Закрыто');
                        isCallActive = false;
                    } else if (state === 'checking') { setStatus('🔄 Соединение…'); }
                };
                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        log('ICE candidate: ' + event.candidate.candidate);
                    } else {
                        log('ICE gathering complete');
                        if (pc && pc.localDescription) {
                            const fullSdp = pc.localDescription.sdp;
                            sdpOutput.value = fullSdp;
                            localSdp = fullSdp;
                            const lines = fullSdp.split('\n');
                            const hasCandidates = lines.some(l => l.includes('a=candidate'));
                            if (!hasCandidates) log('⚠️ В SDP нет ICE-кандидатов!');
                            else log('✅ Кандидаты присутствуют');
                        }
                    }
                };
                pc.ontrack = (event) => {
                    log('Получен трек: ' + event.track.kind);
                    if (event.track.kind === 'video') {
                        if (remoteVideo.srcObject !== event.streams[0]) {
                            remoteVideo.srcObject = event.streams[0];
                            remotePlaceholder.style.display = 'none';
                            remoteDot.className = 'dot green';
                            remoteLabel.textContent = 'Собеседник 📹';
                            log('✅ Видео собеседника отображается');
                        }
                    } else if (event.track.kind === 'audio') {
                        log('✅ Аудио собеседника получено');
                    }
                };
                pc.onconnectionstatechange = () => {
                    const state = pc.connectionState;
                    log(`Connection state: ${state}`);
                    if (state === 'connected') { setStatus('✅ Подключено', true);
                        isCallActive = true; } else if (state === 'failed' || state === 'disconnected') { setStatus(
                            '❌ Потеря связи');
                        isCallActive = false; } else if (state === 'closed') { setStatus('🔴 Закрыто');
                        isCallActive = false; }
                };
                return pc;
            }

            // ---------- Гибкий запрос медиа (аудио обязательно, видео – если доступно) ----------
            async function requestMedia() {
                let audioStream = null;
                let videoStream = null;
                let combinedStream = null;

                // 1. Сначала запрашиваем аудио (обязательно)
                try {
                    audioStream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: true, noiseSuppression: true } });
                    log('✅ Аудио получено');
                } catch (err) {
                    log('❌ Ошибка получения аудио: ' + err.name + ' — ' + err.message);
                    throw new Error('Не удалось получить доступ к микрофону. Проверьте, что он подключен и разрешён в браузере.');
                }

                // 2. Пытаемся получить видео (опционально)
                try {
                    videoStream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' }
                    });
                    log('✅ Видео получено');
                    hasVideo = true;
                } catch (err) {
                    if (err.name === 'NotFoundError' || err.name === 'DevicesNotFoundError') {
                        log('⚠️ Видео не найдено – работаем только с аудио.');
                        hasVideo = false;
                    } else if (err.name === 'NotAllowedError' || err.name === 'PermissionDeniedError') {
                        log('⚠️ Доступ к видео запрещён – работаем только с аудио.');
                        hasVideo = false;
                    } else {
                        log('⚠️ Ошибка при получении видео: ' + err.name + ' — ' + err.message);
                        hasVideo = false;
                    }
                    videoStream = null;
                }

                // 3. Объединяем аудио и (если есть) видео в один поток
                if (audioStream && videoStream) {
                    // Берём дорожки из обоих потоков
                    const audioTracks = audioStream.getAudioTracks();
                    const videoTracks = videoStream.getVideoTracks();
                    combinedStream = new MediaStream([...audioTracks, ...videoTracks]);
                } else if (audioStream) {
                    combinedStream = audioStream; // только аудио
                } else {
                    throw new Error('Не удалось получить ни аудио, ни видео.');
                }

                return combinedStream;
            }

            // ---------- Инициализация локального потока ----------
            async function initLocalStream() {
                try {
                    if (localStream) {
                        // уже есть
                        return true;
                    }
                    localStream = await requestMedia();
                    localVideo.srcObject = localStream;
                    localPlaceholder.style.display = 'none';
                    localDot.className = 'dot green';

                    audioTrack = localStream.getAudioTracks()[0] || null;
                    cameraTrack = localStream.getVideoTracks()[0] || null;

                    if (cameraTrack) {
                        hasVideo = true;
                        localLabel.textContent = 'Вы 📹';
                        localDot.className = 'dot green';
                    } else {
                        hasVideo = false;
                        localLabel.textContent = 'Вы (аудио)';
                        localDot.className = 'dot off';
                        // Скрываем кнопку "Выкл. камеру", если видео нет
                        btnVideo.style.display = 'none';
                    }

                    if (!audioTrack) {
                        log('⚠️ Нет аудиотрека (это странно, т.к. мы запросили аудио)');
                        showError('⚠️ Микрофон не найден. Проверьте подключение.');
                        return false;
                    }

                    showError('✅ Доступ получен' + (hasVideo ? ' (видео+аудио)' : ' (только аудио)'), true);
                    log('✅ Локальный поток инициализирован' + (hasVideo ? ' с видео' : ' без видео'));
                    return true;
                } catch (err) {
                    log('❌ Ошибка initLocalStream: ' + err.message);
                    localPlaceholder.style.display = 'flex';
                    localDot.className = 'dot off';
                    localLabel.textContent = '❌ Ошибка';
                    showError('❌ ' + err.message);
                    return false;
                }
            }

            // ---------- Добавление треков в PC ----------
            function addTracksToPC() {
                if (!pc || !localStream) return;
                if (cameraTrack && !videoSender) {
                    videoSender = pc.addTrack(cameraTrack, localStream);
                    log('➕ Добавлен видеотрек');
                } else if (cameraTrack && videoSender) {
                    try { videoSender.replaceTrack(cameraTrack); } catch (e) {}
                }
                if (audioTrack && !audioSender) {
                    audioSender = pc.addTrack(audioTrack, localStream);
                    log('➕ Добавлен аудиотрек');
                } else if (audioTrack && audioSender) {
                    try { audioSender.replaceTrack(audioTrack); } catch (e) {}
                }
            }

            // ---------- Ожидание ICE ----------
            function waitForIceGathering(pc, timeout = 10000) {
                return new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') { resolve(); return; }
                    let resolved = false;
                    const timer = setTimeout(() => { if (!resolved) { resolved = true;
                            log('⏱️ ICE gathering timeout'); resolve(); } }, timeout);
                    pc.onicegatheringstatechange = () => {
                        if (pc.iceGatheringState === 'complete' && !resolved) {
                            resolved = true;
                            clearTimeout(timer);
                            log('✅ ICE gathering completed');
                            resolve();
                        }
                    };
                });
            }

            // ---------- Основные действия ----------
            async function startCall() {
                const ok = await initLocalStream();
                if (!ok) {
                    showError('Нет доступа к медиа – звонок невозможен. Нажмите "Запросить доступ".');
                    return false;
                }
                if (!pc) createPeerConnection();
                addTracksToPC();
                setStatus('🔄 Готов к сигналингу');
                log('✅ Локальный поток готов');
                return true;
            }

            async function createOffer() {
                if (!await startCall()) return;
                try {
                    const offer = await pc.createOffer({ offerToReceiveVideo: true, offerToReceiveAudio: true });
                    await pc.setLocalDescription(offer);
                    log('✅ Offer создан, ждём ICE...');
                    await waitForIceGathering(pc);
                    if (pc.localDescription) {
                        sdpOutput.value = pc.localDescription.sdp;
                        localSdp = pc.localDescription.sdp;
                        log('📋 Offer готов к копированию');
                    }
                } catch (err) {
                    log('❌ Ошибка createOffer: ' + err.message);
                    showError('Ошибка: ' + err.message);
                }
            }

            async function createAnswer() {
                const offerSdp = sdpInput.value.trim();
                if (!offerSdp) { alert('Вставьте Offer от собеседника в поле ввода.'); return; }
                if (!await startCall()) return;
                try {
                    const offerDesc = new RTCSessionDescription({ type: 'offer', sdp: offerSdp });
                    await pc.setRemoteDescription(offerDesc);
                    log('✅ Remote offer установлен');
                    addTracksToPC();
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    log('✅ Answer создан, ждём ICE...');
                    await waitForIceGathering(pc);
                    if (pc.localDescription) {
                        sdpOutput.value = pc.localDescription.sdp;
                        localSdp = pc.localDescription.sdp;
                        log('📋 Answer готов к копированию');
                    }
                } catch (err) {
                    log('❌ Ошибка createAnswer: ' + err.message);
                    showError('Ошибка: ' + err.message);
                }
            }

            async function applyAnswer() {
                const answerSdp = sdpInput.value.trim();
                if (!answerSdp) { alert('Вставьте Answer от собеседника.'); return; }
                if (!pc) { alert('Сначала создайте Offer (кнопка "Создать Offer")'); return; }
                try {
                    const answerDesc = new RTCSessionDescription({ type: 'answer', sdp: answerSdp });
                    await pc.setRemoteDescription(answerDesc);
                    log('✅ Remote answer установлен');
                    setStatus('🔄 Ожидание соединения…');
                } catch (err) {
                    log('❌ Ошибка applyAnswer: ' + err.message);
                    showError('Ошибка: ' + err.message);
                }
            }

            async function applyOffer() {
                const offerSdp = sdpInput.value.trim();
                if (!offerSdp) { alert('Вставьте Offer от собеседника.'); return; }
                if (!await startCall()) return;
                try {
                    const offerDesc = new RTCSessionDescription({ type: 'offer', sdp: offerSdp });
                    await pc.setRemoteDescription(offerDesc);
                    log('✅ Remote offer установлен');
                    addTracksToPC();
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    await waitForIceGathering(pc);
                    if (pc.localDescription) {
                        sdpOutput.value = pc.localDescription.sdp;
                        localSdp = pc.localDescription.sdp;
                        log('📋 Answer создан и скопирован в поле вывода');
                    }
                } catch (err) {
                    log('❌ Ошибка applyOffer: ' + err.message);
                    showError('Ошибка: ' + err.message);
                }
            }

            // ---------- Управление ----------
            function toggleMute() {
                if (!localStream) return;
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length === 0) return;
                const enabled = audioTracks[0].enabled;
                audioTracks[0].enabled = !enabled;
                isMuted = !enabled;
                muteLabel.textContent = isMuted ? 'Вкл. микрофон' : 'Выкл. микрофон';
                btnMute.classList.toggle('active', isMuted);
                log(isMuted ? '🔇 Микрофон выключен' : '🎤 Микрофон включён');
            }

            function toggleVideo() {
                if (!localStream || !hasVideo) return;
                const videoTracks = localStream.getVideoTracks();
                if (videoTracks.length === 0) return;
                const enabled = videoTracks[0].enabled;
                videoTracks[0].enabled = !enabled;
                isVideoOff = !enabled;
                videoLabel.textContent = isVideoOff ? 'Вкл. камеру' : 'Выкл. камеру';
                btnVideo.classList.toggle('active', isVideoOff);
                if (isVideoOff) { localDot.className = 'dot off';
                    localLabel.textContent = 'Вы 🔇'; } else { localDot.className = 'dot green';
                    localLabel.textContent = 'Вы 📹'; }
                log(isVideoOff ? '📷 Камера выключена' : '📷 Камера включена');
            }

            async function toggleScreenShare() {
                if (!pc || !localStream) { alert('Сначала начните звонок.'); return; }
                if (isScreenSharing) {
                    if (screenStream) { screenStream.getTracks().forEach(t => t.stop());
                        screenStream = null; }
                    screenTrack = null;
                    isScreenSharing = false;
                    screenLabel.textContent = 'Показать экран';
                    btnScreen.classList.remove('active-danger');
                    if (cameraTrack && videoSender) {
                        try { await videoSender.replaceTrack(cameraTrack);
                            log('✅ Возврат к камере'); } catch (e) { log('⚠️ Не удалось вернуть камеру: ' + e.message); }
                    }
                    if (localStream) {
                        localVideo.srcObject = localStream;
                        localPlaceholder.style.display = 'none';
                        localDot.className = hasVideo ? 'dot green' : 'dot off';
                        localLabel.textContent = hasVideo ? 'Вы 📹' : 'Вы (аудио)';
                    }
                    log('🛑 Демонстрация экрана остановлена');
                    return;
                }
                try {
                    const screen = await navigator.mediaDevices.getDisplayMedia({ video: { cursor: 'always' }, audio: false });
                    screenStream = screen;
                    screenTrack = screen.getVideoTracks()[0];
                    if (!screenTrack) { alert('Нет видеотрека экрана'); return; }
                    if (videoSender) {
                        await videoSender.replaceTrack(screenTrack);
                        isScreenSharing = true;
                        screenLabel.textContent = '⏹️ Остановить экран';
                        btnScreen.classList.add('active-danger');
                        localVideo.srcObject = screenStream;
                        localPlaceholder.style.display = 'none';
                        localDot.className = 'dot green';
                        localLabel.textContent = '🖥️ Экран';
                        screenTrack.onended = () => { if (isScreenSharing) toggleScreenShare(); };
                        log('🖥️ Демонстрация экрана активна');
                    } else {
                        screenStream.getTracks().forEach(t => t.stop());
                        screenStream = null;
                        screenTrack = null;
                    }
                } catch (err) {
                    log('❌ Ошибка экрана: ' + err.message);
                    if (err.name !== 'NotAllowedError' && err.name !== 'AbortError') {
                        alert('Не удалось начать демонстрацию: ' + err.message);
                    }
                }
            }

            function endCall() {
                if (pc) { pc.close();
                    pc = null; }
                if (screenStream) { screenStream.getTracks().forEach(t => t.stop());
                    screenStream = null;
                    screenTrack = null; }
                if (localStream) { localStream.getTracks().forEach(t => t.stop());
                    localStream = null; }
                cameraTrack = null;
                audioTrack = null;
                videoSender = null;
                audioSender = null;
                isScreenSharing = false;
                isCallActive = false;
                isMuted = false;
                isVideoOff = false;
                hasVideo = false;
                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                localPlaceholder.style.display = 'flex';
                remotePlaceholder.style.display = 'flex';
                localDot.className = 'dot';
                remoteDot.className = 'dot';
                localLabel.textContent = 'Вы';
                remoteLabel.textContent = 'Собеседник';
                sdpOutput.value = '';
                sdpInput.value = '';
                setStatus('⏳ Ожидание');
                setIceStatus('⏳');
                log('📞 Звонок завершён');
                btnScreen.classList.remove('active-danger');
                btnMute.classList.remove('active');
                btnVideo.classList.remove('active');
                muteLabel.textContent = 'Выкл. микрофон';
                videoLabel.textContent = 'Выкл. камеру';
                screenLabel.textContent = 'Показать экран';
                btnVideo.style.display = 'inline-flex'; // показываем кнопку видео по умолчанию
            }

            function resetAll() {
                endCall();
                log('🔄 Полный сброс');
                showError('Сброшено. Нажмите "Запросить доступ" для повторного разрешения.', true);
            }

            // ---------- Кнопка повторного запроса доступа ----------
            async function retryAccess() {
                // Сбросим локальный поток, если есть
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                    cameraTrack = null;
                    audioTrack = null;
                    videoSender = null;
                    audioSender = null;
                }
                localVideo.srcObject = null;
                localPlaceholder.style.display = 'flex';
                localDot.className = 'dot';
                localLabel.textContent = 'Вы';
                btnVideo.style.display = 'inline-flex';
                // Запросим заново
                const ok = await initLocalStream();
                if (ok) {
                    if (pc) {
                        addTracksToPC();
                        log('✅ Доступ обновлён. Если вы уже обменялись SDP, нажмите соответствующие кнопки заново.');
                    } else {
                        log('✅ Доступ получен. Теперь создайте Offer или Answer.');
                    }
                } else {
                    showError('❌ Доступ не получен. Проверьте разрешения в браузере (замок 🔒) и наличие устройств.');
                }
            }

            // ---------- Прочие инициализации ----------
            function generatePeerId() {
                return Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            let peerId = generatePeerId();
            peerIdLabel.textContent = '🆔 ID: ' + peerId;

            // ---------- Привязка кнопок ----------
            btnCreateOffer.addEventListener('click', createOffer);
            btnCreateAnswer.addEventListener('click', createAnswer);
            btnConnectAnswer.addEventListener('click', applyAnswer);
            btnConnectOffer.addEventListener('click', applyOffer);
            btnMute.addEventListener('click', toggleMute);
            btnVideo.addEventListener('click', toggleVideo);
            btnScreen.addEventListener('click', toggleScreenShare);
            btnEndCall.addEventListener('click', endCall);
            btnReset.addEventListener('click', resetAll);
            btnRetryAccess.addEventListener('click', retryAccess);
            btnCopyOutput.addEventListener('click', () => {
                const text = sdpOutput.value;
                if (!text) { alert('Нет данных для копирования'); return; }
                navigator.clipboard.writeText(text).then(() => log('📋 Скопировано')).catch(() => { sdpOutput.select();
                    document.execCommand('copy');
                    log('📋 Скопировано (fallback)'); });
            });
            btnPasteInput.addEventListener('click', async () => {
                try {
                    const text = await navigator.clipboard.readText();
                    sdpInput.value = text;
                    log('📥 Вставлено из буфера');
                } catch (_) { alert('Не удалось прочитать буфер обмена. Вставьте вручную (Ctrl+V)'); }
            });

            // Ctrl+Enter в sdpInput
            sdpInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                    e.preventDefault();
                    const text = sdpInput.value.trim();
                    if (text.includes('a=setup:active')) {
                        applyAnswer().catch(() => {});
                    } else {
                        applyOffer().catch(() => {});
                    }
                }
            });

            log('🚀 Приложение загружено. Нажмите "Создать Offer" или "Создать Answer" для начала.');
            setStatus('⏳ Готов');

            // При загрузке страницы автоматически пробуем получить доступ (чтобы показать ошибку сразу)
            initLocalStream().then(ok => {
                if (!ok) {
                    showError('👀 Не удалось получить доступ к камере/микрофону. Нажмите "Запросить доступ" после настройки разрешений.', false);
                }
            });

            window.addEventListener('beforeunload', () => {
                if (pc) pc.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            });

        })();
    </script>
</body>
</html>
