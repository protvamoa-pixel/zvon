<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Видеозвонок с демонстрацией экрана</title>

    <style>
        /* -------- Reset & Base -------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0b0e14;
            color: #eef2f8;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .app {
            max-width: 1200px;
            width: 100%;
            background: #141a24;
            border-radius: 28px;
            padding: 24px 28px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.7);
            border: 1px solid #2a3340;
            transition: all 0.2s;
        }
        h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 22px;
            color: #f0f4fe;
        }
        h1 small {
            font-size: 14px;
            font-weight: 400;
            color: #7a8aa0;
            margin-left: 6px;
        }
        .status-badge {
            font-size: 12px;
            font-weight: 500;
            background: #1f2a38;
            color: #8aa0c0;
            padding: 2px 14px;
            border-radius: 40px;
            margin-left: auto;
        }
        .status-badge.online {
            background: #1a3a2a;
            color: #5fd9a0;
        }

        /* -------- Video Grid -------- */
        .video-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 16px;
            margin-bottom: 22px;
            border-radius: 18px;
            overflow: hidden;
            background: #0f151e;
            min-height: 340px;
        }
        .video-wrapper {
            position: relative;
            background: #0a0e15;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
            min-height: 200px;
            border: 1px solid #26303e;
            transition: border 0.3s;
        }
        .video-wrapper.active {
            border-color: #3b6af0;
        }
        .video-wrapper video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            background: #0a0e15;
        }
        .video-label {
            position: absolute;
            bottom: 12px;
            left: 14px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: blur(6px);
            padding: 4px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 500;
            color: #cddcec;
            pointer-events: none;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }
        .video-label .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
            background: #3b6af0;
        }
        .video-label .dot.green {
            background: #3dd68c;
        }
        .video-label .dot.off {
            background: #5a6a80;
        }
        .placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #4a5a70;
            font-size: 14px;
            gap: 6px;
            background: #0f151e;
        }
        .placeholder svg {
            opacity: 0.3;
            width: 48px;
            height: 48px;
        }

        /* -------- Controls -------- */
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 20px;
            background: #111a26;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #26303e;
        }
        .controls .btn-group {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            flex: 1;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 7px;
            padding: 9px 18px;
            border-radius: 40px;
            border: none;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            background: #1f2a38;
            color: #cddcec;
            white-space: nowrap;
        }
        .btn:hover {
            background: #2c3a4c;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-primary {
            background: #2b5fe0;
            color: #fff;
        }
        .btn-primary:hover {
            background: #3b70f0;
        }
        .btn-danger {
            background: #c2414a;
            color: #fff;
        }
        .btn-danger:hover {
            background: #d9555e;
        }
        .btn-success {
            background: #1f8b4c;
            color: #fff;
        }
        .btn-success:hover {
            background: #28a35c;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #3a4a5e;
        }
        .btn-outline:hover {
            background: #1f2a38;
        }
        .btn-icon {
            font-size: 18px;
            line-height: 1;
        }
        .btn .badge {
            background: rgba(255, 255, 255, 0.12);
            padding: 0 8px;
            border-radius: 20px;
            font-size: 11px;
        }
        .btn.active {
            background: #3b6af0;
            color: #fff;
            box-shadow: 0 0 0 2px #3b6af066;
        }
        .btn.active-danger {
            background: #c2414a;
            color: #fff;
        }

        /* -------- Signaling Panel -------- */
        .signaling {
            background: #0f151e;
            border-radius: 16px;
            padding: 18px 20px 20px;
            border: 1px solid #26303e;
            margin-top: 4px;
        }
        .signaling .row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: stretch;
            margin-bottom: 10px;
        }
        .signaling .row:last-child {
            margin-bottom: 0;
        }
        .signaling textarea {
            flex: 1;
            min-width: 180px;
            background: #0a0e15;
            border: 1px solid #26303e;
            border-radius: 12px;
            color: #d6e4f0;
            font-size: 13px;
            font-family: 'Courier New', monospace;
            padding: 12px 14px;
            resize: vertical;
            min-height: 70px;
            transition: border 0.2s;
        }
        .signaling textarea:focus {
            outline: none;
            border-color: #3b6af0;
        }
        .signaling .hint {
            font-size: 12px;
            color: #5a6a80;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }
        .signaling .hint code {
            background: #1a2330;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            color: #9ab0d0;
        }
        .step-label {
            font-size: 12px;
            font-weight: 600;
            color: #7a8aa0;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
        }

        /* -------- Responsive -------- */
        @media (max-width: 740px) {
            .app {
                padding: 16px;
            }
            .video-grid {
                grid-template-columns: 1fr;
                gap: 12px;
                min-height: 240px;
            }
            .video-wrapper {
                aspect-ratio: 16 / 10;
                min-height: 140px;
            }
            .controls {
                border-radius: 20px;
                padding: 10px 14px;
                gap: 8px;
            }
            .btn {
                padding: 7px 12px;
                font-size: 12px;
            }
            .signaling {
                padding: 14px;
            }
            .signaling .row {
                flex-direction: column;
            }
            .step-label {
                min-width: auto;
            }
            h1 {
                font-size: 18px;
            }
        }
        @media (max-width: 460px) {
            .controls .btn-group {
                gap: 4px;
            }
            .btn {
                padding: 6px 10px;
                font-size: 11px;
            }
            .btn .btn-icon {
                font-size: 15px;
            }
        }

        /* -------- Utilities -------- */
        .hidden {
            display: none !important;
        }
        .flex-center {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .gap-4 {
            gap: 4px;
        }
        .mt-2 {
            margin-top: 8px;
        }
        .text-muted {
            color: #5a6a80;
        }
        .text-sm {
            font-size: 12px;
        }
        .w-full {
            width: 100%;
        }
        .truncate {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
    </style>
</head>
<body>

    <div class="app" id="app">

        <!-- Header -->
        <h1>
            📡 Видеозвонок
            <small>с демонстрацией экрана</small>
            <span class="status-badge" id="connectionStatus">⏳ Ожидание</span>
        </h1>

        <!-- Video Grid -->
        <div class="video-grid">
            <!-- Remote -->
            <div class="video-wrapper" id="remoteWrapper">
                <video id="remoteVideo" autoplay playsinline></video>
                <div class="video-label">
                    <span class="dot" id="remoteDot"></span>
                    <span id="remoteLabel">Собеседник</span>
                </div>
                <div class="placeholder" id="remotePlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>Ожидание подключения…</span>
                </div>
            </div>
            <!-- Local -->
            <div class="video-wrapper active" id="localWrapper">
                <video id="localVideo" autoplay playsinline muted></video>
                <div class="video-label">
                    <span class="dot green" id="localDot"></span>
                    <span id="localLabel">Вы</span>
                </div>
                <div class="placeholder" id="localPlaceholder">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                    <span>Камера не активна</span>
                </div>
            </div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <div class="btn-group">
                <button class="btn" id="btnMute" title="Выключить / включить микрофон">
                    <span class="btn-icon">🎤</span> <span id="muteLabel">Выкл. микрофон</span>
                </button>
                <button class="btn" id="btnVideo" title="Выключить / включить камеру">
                    <span class="btn-icon">📷</span> <span id="videoLabel">Выкл. камеру</span>
                </button>
                <button class="btn" id="btnScreen" title="Демонстрация экрана">
                    <span class="btn-icon">🖥️</span> <span id="screenLabel">Показать экран</span>
                </button>
                <button class="btn btn-danger" id="btnEndCall" title="Завершить звонок">
                    <span class="btn-icon">📞</span> Завершить
                </button>
            </div>
            <div style="display:flex;gap:6px;margin-left:auto;">
                <button class="btn btn-outline" id="btnReset" title="Сбросить соединение">
                    🔄 Сброс
                </button>
            </div>
        </div>

        <!-- Signaling Panel -->
        <div class="signaling" id="signalingPanel">
            <!-- Row: create offer / answer -->
            <div class="row">
                <div class="step-label">📨 Сигналинг</div>
                <button class="btn btn-primary" id="btnCreateOffer">➕ Создать Offer</button>
                <button class="btn btn-success" id="btnCreateAnswer">➡️ Создать Answer</button>
                <button class="btn btn-outline" id="btnConnectAnswer">🔗 Применить Answer</button>
                <button class="btn btn-outline" id="btnConnectOffer">🔗 Применить Offer</button>
                <span class="hint" style="margin-left:auto;">
                    <span id="peerIdLabel">🆔 ID: —</span>
                </span>
            </div>
            <!-- Row: textareas -->
            <div class="row">
                <textarea id="sdpOutput" placeholder="Здесь появится Offer / Answer для копирования…" spellcheck="false"></textarea>
                <textarea id="sdpInput" placeholder="Вставьте сюда Offer или Answer от собеседника…" spellcheck="false"></textarea>
            </div>
            <div class="row">
                <div class="hint">
                    <span>📋 Скопируйте свой Offer/Answer и отправьте другу любым мессенджером.</span>
                    <button class="btn btn-outline" id="btnCopyOutput" style="padding:4px 14px;font-size:12px;">📄 Копировать</button>
                    <button class="btn btn-outline" id="btnPasteInput" style="padding:4px 14px;font-size:12px;">📥 Вставить</button>
                </div>
                <div class="hint" style="margin-left:auto;">
                    <code id="iceStatus">ICE: ⏳</code>
                </div>
            </div>
            <!-- Connection log -->
            <div class="row" style="margin-top:6px;border-top:1px solid #1f2a38;padding-top:10px;">
                <div class="hint" style="flex:1;font-size:12px;color:#6a7a90;" id="logArea">
                    💡 Готов к работе. Создайте Offer или Answer.
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        //  WEBRTC VIDEO CALL + SCREEN SHARE  —  SINGLE FILE
        //  Signaling: manual copy-paste (SDP offer/answer)
        //  STUN: Google STUN
        // ============================================================

        (function() {
            'use strict';

            // -------- DOM refs --------
            const localVideo = document.getElementById('localVideo');
            const remoteVideo = document.getElementById('remoteVideo');
            const localWrapper = document.getElementById('localWrapper');
            const remoteWrapper = document.getElementById('remoteWrapper');
            const localPlaceholder = document.getElementById('localPlaceholder');
            const remotePlaceholder = document.getElementById('remotePlaceholder');
            const localDot = document.getElementById('localDot');
            const remoteDot = document.getElementById('remoteDot');
            const localLabel = document.getElementById('localLabel');
            const remoteLabel = document.getElementById('remoteLabel');

            const btnMute = document.getElementById('btnMute');
            const btnVideo = document.getElementById('btnVideo');
            const btnScreen = document.getElementById('btnScreen');
            const btnEndCall = document.getElementById('btnEndCall');
            const btnReset = document.getElementById('btnReset');
            const btnCreateOffer = document.getElementById('btnCreateOffer');
            const btnCreateAnswer = document.getElementById('btnCreateAnswer');
            const btnConnectOffer = document.getElementById('btnConnectOffer');
            const btnConnectAnswer = document.getElementById('btnConnectAnswer');
            const btnCopyOutput = document.getElementById('btnCopyOutput');
            const btnPasteInput = document.getElementById('btnPasteInput');

            const sdpOutput = document.getElementById('sdpOutput');
            const sdpInput = document.getElementById('sdpInput');
            const connectionStatus = document.getElementById('connectionStatus');
            const iceStatus = document.getElementById('iceStatus');
            const logArea = document.getElementById('logArea');
            const peerIdLabel = document.getElementById('peerIdLabel');

            const muteLabel = document.getElementById('muteLabel');
            const videoLabel = document.getElementById('videoLabel');
            const screenLabel = document.getElementById('screenLabel');

            // -------- State --------
            let pc = null; // RTCPeerConnection
            let localStream = null; // camera + mic
            let screenStream = null; // screen share stream
            let isScreenSharing = false;
            let isMuted = false;
            let isVideoOff = false;
            let isCallActive = false;
            let localSdp = null; // cached local SDP for copying

            // Track senders
            let videoSender = null;
            let audioSender = null;
            let screenSender = null; // separate sender for screen track (if we add as second stream)

            // For screen sharing we'll use replaceTrack on the video sender
            // We'll store the original camera track to revert

            let cameraTrack = null;
            let audioTrack = null;
            let screenTrack = null;

            // -------- STUN / ICE --------
            const rtcConfig = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' },
                ],
                iceCandidatePoolSize: 10,
            };

            // -------- Logging --------
            function log(msg) {
                const time = new Date().toLocaleTimeString();
                logArea.textContent = `[${time}] ${msg}`;
                console.log(`[WebRTC] ${msg}`);
            }

            function setStatus(text, isOnline = false) {
                connectionStatus.textContent = text;
                connectionStatus.className = 'status-badge' + (isOnline ? ' online' : '');
            }

            function setIceStatus(text) {
                iceStatus.textContent = 'ICE: ' + text;
            }

            // -------- PeerConnection factory --------
            function createPeerConnection() {
                if (pc) {
                    pc.close();
                    pc = null;
                }
                pc = new RTCPeerConnection(rtcConfig);

                // --- ICE events ---
                pc.oniceconnectionstatechange = () => {
                    const state = pc.iceConnectionState;
                    setIceStatus(state);
                    log(`ICE state: ${state}`);
                    if (state === 'connected' || state === 'completed') {
                        setStatus('✅ Подключено', true);
                        isCallActive = true;
                    } else if (state === 'disconnected' || state === 'failed' || state === 'closed') {
                        if (state === 'failed') setStatus('❌ Ошибка ICE');
                        else if (state === 'disconnected') setStatus('⚠️ Разрыв');
                        else if (state === 'closed') setStatus('🔴 Закрыто');
                        isCallActive = false;
                    } else if (state === 'checking') {
                        setStatus('🔄 Соединение…');
                    }
                };

                pc.onicecandidate = (event) => {
                    if (event.candidate) {
                        // We'll collect candidates in the SDP via gathering complete
                        log('ICE candidate: ' + event.candidate.candidate);
                    } else {
                        log('ICE gathering complete');
                        // Update output with complete SDP
                        if (pc && pc.localDescription) {
                            const fullSdp = pc.localDescription.sdp;
                            sdpOutput.value = fullSdp;
                            localSdp = fullSdp;
                            // Also add candidate info
                            const lines = fullSdp.split('\n');
                            const hasCandidates = lines.some(l => l.includes('a=candidate'));
                            if (!hasCandidates) {
                                log('⚠️ В SDP нет ICE-кандидатов — возможно, нужен TURN.');
                            }
                        }
                    }
                };

                pc.ontrack = (event) => {
                    log('Получен трек: ' + event.track.kind);
                    if (event.track.kind === 'video') {
                        if (remoteVideo.srcObject !== event.streams[0]) {
                            remoteVideo.srcObject = event.streams[0];
                            remotePlaceholder.style.display = 'none';
                            remoteDot.className = 'dot green';
                            remoteLabel.textContent = 'Собеседник 📹';
                            log('✅ Видео собеседника отображается');
                        }
                    } else if (event.track.kind === 'audio') {
                        // audio auto-plays
                        log('✅ Аудио собеседника получено');
                    }
                };

                pc.onconnectionstatechange = () => {
                    const state = pc.connectionState;
                    log(`Connection state: ${state}`);
                    if (state === 'connected') {
                        setStatus('✅ Подключено', true);
                        isCallActive = true;
                    } else if (state === 'failed' || state === 'disconnected') {
                        setStatus('❌ Потеря связи');
                        isCallActive = false;
                    } else if (state === 'closed') {
                        setStatus('🔴 Закрыто');
                        isCallActive = false;
                    }
                };

                return pc;
            }

            // -------- Get local media (camera + mic) --------
            async function getLocalMedia() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({
                        video: { width: { ideal: 640 }, height: { ideal: 480 }, facingMode: 'user' },
                        audio: { echoCancellation: true, noiseSuppression: true },
                    });
                    return stream;
                } catch (err) {
                    log('❌ Ошибка доступа к медиа: ' + err.message);
                    alert('Не удалось получить доступ к камере/микрофону.\n' + err.message);
                    throw err;
                }
            }

            // -------- Start call (init local media + create pc) --------
            async function startCall() {
                try {
                    if (!localStream) {
                        localStream = await getLocalMedia();
                        localVideo.srcObject = localStream;
                        localPlaceholder.style.display = 'none';
                        localDot.className = 'dot green';
                        localLabel.textContent = 'Вы 📹';

                        cameraTrack = localStream.getVideoTracks()[0] || null;
                        audioTrack = localStream.getAudioTracks()[0] || null;

                        if (!cameraTrack) log('⚠️ Нет видеотрека');
                        if (!audioTrack) log('⚠️ Нет аудиотрека');
                    }

                    if (!pc) {
                        createPeerConnection();
                    }

                    // Add tracks to peer connection
                    if (localStream) {
                        // Add video
                        if (cameraTrack && !videoSender) {
                            videoSender = pc.addTrack(cameraTrack, localStream);
                            log('➕ Добавлен видеотрек');
                        } else if (cameraTrack && videoSender) {
                            // replace if needed
                            try {
                                await videoSender.replaceTrack(cameraTrack);
                            } catch (e) { /* ignore */ }
                        }

                        // Add audio
                        if (audioTrack && !audioSender) {
                            audioSender = pc.addTrack(audioTrack, localStream);
                            log('➕ Добавлен аудиотрек');
                        } else if (audioTrack && audioSender) {
                            try {
                                await audioSender.replaceTrack(audioTrack);
                            } catch (e) { /* ignore */ }
                        }
                    }

                    setStatus('🔄 Готов к сигналингу');
                    log('✅ Локальный поток готов. Создайте Offer или Answer.');
                    return true;
                } catch (err) {
                    log('❌ Ошибка startCall: ' + err.message);
                    return false;
                }
            }

            // -------- Create Offer --------
            async function createOffer() {
                try {
                    if (!localStream) {
                        const ok = await startCall();
                        if (!ok) return;
                    }
                    if (!pc) createPeerConnection();
                    // Ensure tracks are added
                    if (localStream) {
                        if (cameraTrack && !videoSender) {
                            videoSender = pc.addTrack(cameraTrack, localStream);
                        }
                        if (audioTrack && !audioSender) {
                            audioSender = pc.addTrack(audioTrack, localStream);
                        }
                    }

                    const offer = await pc.createOffer({
                        offerToReceiveVideo: true,
                        offerToReceiveAudio: true,
                    });
                    await pc.setLocalDescription(offer);
                    log('✅ Offer создан, ожидание ICE кандидатов…');

                    // Wait a bit for ICE gathering
                    await waitForIceGathering(pc);

                    // Update output with full SDP
                    if (pc.localDescription) {
                        const sdp = pc.localDescription.sdp;
                        sdpOutput.value = sdp;
                        localSdp = sdp;
                        log('📋 Offer готов (скопируйте и отправьте другу)');
                    } else {
                        log('⚠️ Нет localDescription');
                    }

                } catch (err) {
                    log('❌ Ошибка createOffer: ' + err.message);
                }
            }

            // -------- Create Answer --------
            async function createAnswer() {
                try {
                    const offerSdp = sdpInput.value.trim();
                    if (!offerSdp) {
                        alert('Сначала вставьте Offer от собеседника в поле слева.');
                        return;
                    }

                    if (!localStream) {
                        const ok = await startCall();
                        if (!ok) return;
                    }
                    if (!pc) createPeerConnection();

                    // Set remote description (offer)
                    const offerDesc = new RTCSessionDescription({ type: 'offer', sdp: offerSdp });
                    await pc.setRemoteDescription(offerDesc);
                    log('✅ Remote description (Offer) установлен');

                    // Add local tracks if not already
                    if (localStream) {
                        if (cameraTrack && !videoSender) {
                            videoSender = pc.addTrack(cameraTrack, localStream);
                        }
                        if (audioTrack && !audioSender) {
                            audioSender = pc.addTrack(audioTrack, localStream);
                        }
                    }

                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    log('✅ Answer создан, ожидание ICE кандидатов…');

                    await waitForIceGathering(pc);

                    if (pc.localDescription) {
                        const sdp = pc.localDescription.sdp;
                        sdpOutput.value = sdp;
                        localSdp = sdp;
                        log('📋 Answer готов (скопируйте и отправьте другу)');
                    }

                } catch (err) {
                    log('❌ Ошибка createAnswer: ' + err.message);
                    alert('Ошибка при создании Answer: ' + err.message);
                }
            }

            // -------- Apply Answer (connect as caller) --------
            async function applyAnswer() {
                try {
                    const answerSdp = sdpInput.value.trim();
                    if (!answerSdp) {
                        alert('Вставьте Answer от собеседника в поле слева.');
                        return;
                    }
                    if (!pc) {
                        alert('Сначала создайте Offer (кнопка "Создать Offer")');
                        return;
                    }
                    if (pc.signalingState === 'closed' || pc.signalingState === 'failed') {
                        log('⚠️ PeerConnection в состоянии ' + pc.signalingState + ', пересоздаём...');
                        createPeerConnection();
                        // re-add tracks
                        if (localStream) {
                            if (cameraTrack && !videoSender) {
                                videoSender = pc.addTrack(cameraTrack, localStream);
                            }
                            if (audioTrack && !audioSender) {
                                audioSender = pc.addTrack(audioTrack, localStream);
                            }
                        }
                        // We need an offer first
                        await createOffer();
                        // Then try again
                        // but we need to set the remote answer after we have an offer
                        // Actually the user should re-create offer and then apply answer
                        alert('Пожалуйста, нажмите "Создать Offer" ещё раз, затем вставьте Answer и нажмите "Применить Answer"');
                        return;
                    }

                    const answerDesc = new RTCSessionDescription({ type: 'answer', sdp: answerSdp });
                    await pc.setRemoteDescription(answerDesc);
                    log('✅ Remote description (Answer) установлен');
                    setStatus('🔄 Ожидание соединения…');
                    log('⏳ Ожидание ICE соединения…');

                } catch (err) {
                    log('❌ Ошибка applyAnswer: ' + err.message);
                    alert('Ошибка при применении Answer: ' + err.message);
                }
            }

            // -------- Apply Offer (connect as callee) --------
            async function applyOffer() {
                try {
                    const offerSdp = sdpInput.value.trim();
                    if (!offerSdp) {
                        alert('Вставьте Offer от собеседника в поле слева.');
                        return;
                    }
                    if (!localStream) {
                        const ok = await startCall();
                        if (!ok) return;
                    }
                    if (!pc) createPeerConnection();

                    // Add local tracks
                    if (localStream) {
                        if (cameraTrack && !videoSender) {
                            videoSender = pc.addTrack(cameraTrack, localStream);
                        }
                        if (audioTrack && !audioSender) {
                            audioSender = pc.addTrack(audioTrack, localStream);
                        }
                    }

                    const offerDesc = new RTCSessionDescription({ type: 'offer', sdp: offerSdp });
                    await pc.setRemoteDescription(offerDesc);
                    log('✅ Remote description (Offer) установлен');

                    // Automatically create answer
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    log('✅ Answer создан автоматически');

                    await waitForIceGathering(pc);

                    if (pc.localDescription) {
                        const sdp = pc.localDescription.sdp;
                        sdpOutput.value = sdp;
                        localSdp = sdp;
                        log('📋 Answer готов (скопируйте и отправьте другу)');
                    }

                } catch (err) {
                    log('❌ Ошибка applyOffer: ' + err.message);
                    alert('Ошибка при применении Offer: ' + err.message);
                }
            }

            // -------- Wait for ICE gathering --------
            function waitForIceGathering(pc, timeout = 5000) {
                return new Promise((resolve) => {
                    if (pc.iceGatheringState === 'complete') {
                        resolve();
                        return;
                    }
                    let resolved = false;
                    const timer = setTimeout(() => {
                        if (!resolved) {
                            resolved = true;
                            log('⏱️ ICE gathering timeout, продолжаем...');
                            resolve();
                        }
                    }, timeout);

                    pc.onicegatheringstatechange = () => {
                        if (pc.iceGatheringState === 'complete' && !resolved) {
                            resolved = true;
                            clearTimeout(timer);
                            log('✅ ICE gathering completed');
                            resolve();
                        }
                    };
                });
            }

            // -------- Screen sharing --------
            async function toggleScreenShare() {
                if (!pc || !localStream) {
                    alert('Сначала начните звонок (создайте Offer или Answer)');
                    return;
                }

                if (isScreenSharing) {
                    // Stop screen sharing
                    if (screenStream) {
                        screenStream.getTracks().forEach(t => t.stop());
                        screenStream = null;
                    }
                    screenTrack = null;
                    isScreenSharing = false;
                    screenLabel.textContent = 'Показать экран';
                    btnScreen.classList.remove('active-danger');
                    // Revert to camera
                    if (cameraTrack && videoSender) {
                        try {
                            await videoSender.replaceTrack(cameraTrack);
                            log('✅ Возврат к камере');
                        } catch (e) {
                            log('⚠️ Не удалось вернуть камеру: ' + e.message);
                        }
                    }
                    // Show local video again
                    if (localStream) {
                        localVideo.srcObject = localStream;
                        localPlaceholder.style.display = 'none';
                        localDot.className = 'dot green';
                        localLabel.textContent = 'Вы 📹';
                    }
                    log('🛑 Демонстрация экрана остановлена');
                    return;
                }

                // Start screen sharing
                try {
                    const screen = await navigator.mediaDevices.getDisplayMedia({
                        video: { cursor: 'always' },
                        audio: false,
                    });
                    screenStream = screen;
                    screenTrack = screen.getVideoTracks()[0];

                    if (!screenTrack) {
                        alert('Не удалось получить поток экрана');
                        return;
                    }

                    // Replace video track
                    if (videoSender) {
                        await videoSender.replaceTrack(screenTrack);
                        isScreenSharing = true;
                        screenLabel.textContent = '⏹️ Остановить экран';
                        btnScreen.classList.add('active-danger');
                        log('🖥️ Демонстрация экрана активна');

                        // Show screen in local video
                        localVideo.srcObject = screenStream;
                        localPlaceholder.style.display = 'none';
                        localDot.className = 'dot green';
                        localLabel.textContent = '🖥️ Экран';

                        // Handle track end (user stops sharing via browser UI)
                        screenTrack.onended = () => {
                            if (isScreenSharing) {
                                toggleScreenShare(); // stop cleanly
                            }
                        };

                    } else {
                        log('⚠️ Нет videoSender для замены');
                        screenStream.getTracks().forEach(t => t.stop());
                        screenStream = null;
                        screenTrack = null;
                    }

                } catch (err) {
                    log('❌ Ошибка демонстрации экрана: ' + err.message);
                    if (err.name !== 'NotAllowedError' && err.name !== 'AbortError') {
                        alert('Не удалось начать демонстрацию экрана: ' + err.message);
                    }
                }
            }

            // -------- Mute --------
            function toggleMute() {
                if (!localStream) return;
                const audioTracks = localStream.getAudioTracks();
                if (audioTracks.length === 0) return;
                const enabled = audioTracks[0].enabled;
                audioTracks[0].enabled = !enabled;
                isMuted = !enabled;
                muteLabel.textContent = isMuted ? 'Вкл. микрофон' : 'Выкл. микрофон';
                btnMute.classList.toggle('active', isMuted);
                log(isMuted ? '🔇 Микрофон выключен' : '🎤 Микрофон включён');
            }

            // -------- Toggle video --------
            function toggleVideo() {
                if (!localStream) return;
                const videoTracks = localStream.getVideoTracks();
                if (videoTracks.length === 0) return;
                const enabled = videoTracks[0].enabled;
                videoTracks[0].enabled = !enabled;
                isVideoOff = !enabled;
                videoLabel.textContent = isVideoOff ? 'Вкл. камеру' : 'Выкл. камеру';
                btnVideo.classList.toggle('active', isVideoOff);
                if (isVideoOff) {
                    localDot.className = 'dot off';
                    localLabel.textContent = 'Вы 🔇';
                } else {
                    localDot.className = 'dot green';
                    localLabel.textContent = 'Вы 📹';
                }
                log(isVideoOff ? '📷 Камера выключена' : '📷 Камера включена');
            }

            // -------- End call --------
            function endCall() {
                if (pc) {
                    pc.close();
                    pc = null;
                }
                if (screenStream) {
                    screenStream.getTracks().forEach(t => t.stop());
                    screenStream = null;
                    screenTrack = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(t => t.stop());
                    localStream = null;
                }
                cameraTrack = null;
                audioTrack = null;
                videoSender = null;
                audioSender = null;
                isScreenSharing = false;
                isCallActive = false;
                isMuted = false;
                isVideoOff = false;

                localVideo.srcObject = null;
                remoteVideo.srcObject = null;
                localPlaceholder.style.display = 'flex';
                remotePlaceholder.style.display = 'flex';
                localDot.className = 'dot';
                remoteDot.className = 'dot';
                localLabel.textContent = 'Вы';
                remoteLabel.textContent = 'Собеседник';
                sdpOutput.value = '';
                sdpInput.value = '';
                localSdp = null;
                setStatus('⏳ Ожидание');
                setIceStatus('⏳');
                log('📞 Звонок завершён');

                btnScreen.classList.remove('active-danger');
                btnMute.classList.remove('active');
                btnVideo.classList.remove('active');
                muteLabel.textContent = 'Выкл. микрофон';
                videoLabel.textContent = 'Выкл. камеру';
                screenLabel.textContent = 'Показать экран';
            }

            // -------- Reset --------
            function resetAll() {
                endCall();
                sdpOutput.value = '';
                sdpInput.value = '';
                log('🔄 Полный сброс');
                // Re-init local media? No, let user start fresh.
                // But we keep the UI clean.
            }

            // -------- Copy / Paste helpers --------
            function copyOutput() {
                const text = sdpOutput.value;
                if (!text) { alert('Нет данных для копирования'); return; }
                navigator.clipboard.writeText(text).then(() => {
                    log('📋 Скопировано в буфер обмена');
                }).catch(() => {
                    // fallback
                    sdpOutput.select();
                    document.execCommand('copy');
                    log('📋 Скопировано (fallback)');
                });
            }

            async function pasteInput() {
                try {
                    const text = await navigator.clipboard.readText();
                    sdpInput.value = text;
                    log('📥 Вставлено из буфера обмена');
                } catch (_) {
                    alert('Не удалось прочитать буфер обмена. Вставьте вручную (Ctrl+V)');
                }
            }

            // -------- Generate peer ID (simple) --------
            function generatePeerId() {
                return Math.random().toString(36).substring(2, 8).toUpperCase();
            }
            let peerId = generatePeerId();
            peerIdLabel.textContent = '🆔 ID: ' + peerId;

            // -------- Init UI --------
            function init() {
                // Buttons
                btnCreateOffer.addEventListener('click', createOffer);
                btnCreateAnswer.addEventListener('click', createAnswer);
                btnConnectAnswer.addEventListener('click', applyAnswer);
                btnConnectOffer.addEventListener('click', applyOffer);
                btnMute.addEventListener('click', toggleMute);
                btnVideo.addEventListener('click', toggleVideo);
                btnScreen.addEventListener('click', toggleScreenShare);
                btnEndCall.addEventListener('click', endCall);
                btnReset.addEventListener('click', resetAll);
                btnCopyOutput.addEventListener('click', copyOutput);
                btnPasteInput.addEventListener('click', pasteInput);

                // Auto-start local media on page load (optional)
                // We'll start when user first interacts
                log('🚀 Приложение загружено. Нажмите "Создать Offer" или "Создать Answer" для начала.');
                setStatus('⏳ Готов');

                // Keyboard shortcut: Ctrl+Enter in sdpInput to apply
                sdpInput.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
                        e.preventDefault();
                        // Try to detect if it's an offer or answer
                        const text = sdpInput.value.trim();
                        if (text.includes('a=setup:active') || text.includes('a=setup:passive')) {
                            // It's an SDP
                            if (text.includes('o=-') && text.includes('t=0 0')) {
                                // Could be offer or answer, try both?
                                // Just call applyOffer or applyAnswer based on context
                                if (text.includes('a=setup:active')) {
                                    // Usually answer has active, offer has passive
                                    applyAnswer().catch(() => {});
                                } else {
                                    applyOffer().catch(() => {});
                                }
                            } else {
                                applyOffer().catch(() => {});
                            }
                        }
                    }
                });

                // Auto-detect paste from clipboard with button
                log('💡 Совет: вставьте SDP от друга и нажмите "Применить Offer" или "Применить Answer"');
            }

            // -------- Init on DOM ready --------
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }

            // -------- Cleanup on page unload --------
            window.addEventListener('beforeunload', () => {
                if (pc) pc.close();
                if (localStream) localStream.getTracks().forEach(t => t.stop());
                if (screenStream) screenStream.getTracks().forEach(t => t.stop());
            });

        })();
    </script>
